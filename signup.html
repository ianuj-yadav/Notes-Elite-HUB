<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NotesHub Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <a href="index.html" style="color: inherit;">NotesHub Elite</a>
                </div>
                <nav class="nav-list">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="marketplace.html" class="nav-link">Marketplace</a>
                    <a href="publish.html" class="nav-link">Publish</a>
                </nav>
                <div class="nav-actions">
                    <a href="login.html" class="btn btn--outline btn--sm">Login</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Signup Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1>Join NotesHub Elite</h1>
                        <p>Create your account and start your academic journey</p>
                    </div>

                    <div class="role-selector">
                        <button class="role-btn active" data-role="buyer">
                            <i class="fas fa-book-reader"></i>
                            <span>I want to buy notes</span>
                        </button>
                        <button class="role-btn" data-role="seller">
                            <i class="fas fa-upload"></i>
                            <span>I want to sell notes</span>
                        </button>
                    </div>

                    <form class="auth-form" id="signupForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" name="lastName" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="university">University/College</label>
                            <input type="text" id="university" name="university" required>
                        </div>

                        <div class="form-group">
                            <label for="course">Course/Major</label>
                            <select id="course" name="course" required>
                                <option value="">Select your course</option>
                                <option value="engineering">Engineering</option>
                                <option value="medical">Medical</option>
                                <option value="business">Business</option>
                                <option value="computer-science">Computer Science</option>
                                <option value="mathematics">Mathematics</option>
                                <option value="physics">Physics</option>
                                <option value="chemistry">Chemistry</option>
                                <option value="literature">Literature</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                            <div class="password-strength">
                                <div class="strength-bar"></div>
                                <span class="strength-text">Password strength</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" name="terms" required>
                                <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn--primary btn--full">Create Account</button>
                    </form>

                    <div class="auth-divider">
                        <span>Or continue with</span>
                    </div>

                    <div class="social-auth">
                        <button class="btn btn--social google-btn">
                            <i class="fab fa-google"></i>
                            Continue with Google
                        </button>
                        <button class="btn btn--social facebook-btn">
                            <i class="fab fa-facebook-f"></i>
                            Continue with Facebook
                        </button>
                    </div>

                    <div class="auth-footer">
                        <p>Already have an account? <a href="login.html">Sign in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
